                { anatomyBatch: 'E', subject: 'Anatomy Dissection', venue: 'Dissection Hall', type: 'Dissection' },
                { anatomyBatch: 'A', subject: 'Histology-A', venue: 'Histology Lab', type: 'Practical' }
            ]}
        ],
        Thursday: [
            { time: '08:00', duration: 60, classes: [
                { batch: 'ALL', subject: 'Biochemistry Lecture', venue: 'Gallery-3', type: 'Lecture' }
            ]},
            { time: '09:00', duration: 60, classes: [
                { batch: 'ALL', subject: 'Anatomy Lecture', venue: 'Gallery-2', type: 'Lecture' }
            ]},
            { time: '10:30', duration: 120, classes: [
                { batch: 'ALL', subject: 'Anatomy Dissection', venue: 'Dissection Hall', type: 'Dissection' }
            ]},
            { time: '12:30', duration: 120, classes: [
                { batch: 'B', subject: 'Physiology Tutorial', venue: 'Tutorial Room', type: 'Tutorial' },
                { batch: 'D', subject: 'Physiology Tutorial', venue: 'Tutorial Room', type: 'Tutorial' },
                { batch: 'A', subject: 'Biochemistry Tutorial', venue: 'Tutorial Room', type: 'Tutorial' },
                { batch: 'C', subject: 'Biochemistry Tutorial', venue: 'Tutorial Room', type: 'Tutorial' }
            ]}
        ],
        Friday: []
    };

    // ── ANNOUNCEMENTS ──────────────────────────────────────
    // In your repo, create announcements.json at the root:
    // [{ "title": "...", "body": "...", "date": "YYYY-MM-DD", "type": "info|warning|urgent" }]
    const ANNOUNCEMENTS_URL =
        'https://raw.githubusercontent.com/XenonTheInertG/somc-routine/main/announcements.json';

    async function loadAnnouncements() {
        const el = document.getElementById('announcementList');
        try {
            const res = await fetch(ANNOUNCEMENTS_URL + '?t=' + Date.now());
            if (!res.ok) throw new Error('not found');
            const data = await res.json();
            if (!Array.isArray(data) || !data.length) {
                el.innerHTML = '<div class="ann-loading">No announcements right now.</div>';
                return;
            }
            el.innerHTML = data.map(a => `
                <div class="announcement-item type-${a.type || 'info'}">
                    <div class="ann-title">
                        ${escHtml(a.title)}
                        <span class="ann-type-chip chip-${a.type || 'info'}">${a.type || 'info'}</span>
                    </div>
                    <div class="ann-body">${escHtml(a.body)}</div>
                    ${a.date ? `<div class="ann-date">${formatDate(a.date)}</div>` : ''}
                </div>
            `).join('');
        } catch {
            el.innerHTML = '<div class="ann-loading">No announcements right now.</div>';
        }
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function formatDate(dateStr) {
        try {
            return new Date(dateStr).toLocaleDateString('en-GB',
                { day: 'numeric', month: 'short', year: 'numeric' });
        } catch { return dateStr; }
    }

    // ── TIME HELPERS ───────────────────────────────────────
    function timeToMinutes(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }
    function nowMinutes() {
        const n = new Date();
        return n.getHours() * 60 + n.getMinutes();
    }
    function nowSeconds() {
        return new Date().getSeconds();
    }
    function formatTime(time) {
        const [h, m] = time.split(':').map(Number);
        const period = h >= 12 ? 'PM' : 'AM';
        const dh = h > 12 ? h - 12 : h === 0 ? 12 : h;
        return `${dh}:${m.toString().padStart(2,'0')} ${period}`;
    }
    function formatCountdown(totalSec) {
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        if (h > 0) return `${h}h ${m}m`;
        if (m > 0) return `${m}m ${s.toString().padStart(2,'0')}s`;
        return `${s}s`;
    }

    // ── MY CLASSES FOR A DAY ───────────────────────────────
    function getMyClasses(day) {
        if (!batch || !anatomyBatch) return [];
        const result = [];
        (schedule[day] || []).forEach(slot => {
            slot.classes.forEach(cls => {
                if (cls.batch === 'ALL' || cls.batch === batch || cls.anatomyBatch === anatomyBatch) {
                    // push only once per slot
                    if (!result.find(r => r.time === slot.time)) {
                        result.push({ ...cls, time: slot.time, duration: slot.duration });
                    }
                }
            });
        });
        return result;
    }

    // ── COUNTDOWN ─────────────────────────────────────────
    function updateCountdown() {
        const banner = document.getElementById('countdownBanner');
        const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const todayName = DAYS[new Date().getDay()];

        if (selectedDay !== todayName || !batch || !anatomyBatch || selectedDay === 'Friday') {
            banner.classList.add('hidden');
            return;
        }

        const now = nowMinutes();
        const sec = nowSeconds();
        const myClasses = getMyClasses(todayName);

        const ongoing = myClasses.find(c => {
            const s = timeToMinutes(c.time);
            return now >= s && now < s + c.duration;
        });
        const next = myClasses.find(c => timeToMinutes(c.time) > now);

        if (ongoing) {
            const endMin = timeToMinutes(ongoing.time) + ongoing.duration;
            const remaining = (endMin - now) * 60 - sec;
            banner.classList.remove('hidden');
            banner.classList.add('ongoing-banner');
            document.getElementById('countdownIcon').textContent = '🟢';
            document.getElementById('countdownLabel').textContent = 'Ongoing — ends in';
            document.getElementById('countdownValue').textContent = formatCountdown(Math.max(0, remaining));
            document.getElementById('countdownSubject').textContent = ongoing.subject;
        } else if (next) {
            const startMin = timeToMinutes(next.time);
            const remaining = (startMin - now) * 60 - sec;
            banner.classList.remove('hidden');
            banner.classList.remove('ongoing-banner');
            document.getElementById('countdownIcon').textContent = '⏱️';
            document.getElementById('countdownLabel').textContent = 'Next class in';
            document.getElementById('countdownValue').textContent = formatCountdown(Math.max(0, remaining));
            document.getElementById('countdownSubject').textContent = next.subject;
        } else {
            banner.classList.add('hidden');
            banner.classList.remove('ongoing-banner');
        }
    }

    // ── SCHEDULE RENDER ────────────────────────────────────
    function updateSchedule() {
        if (scheduleRefreshTimer) { clearTimeout(scheduleRefreshTimer); scheduleRefreshTimer = null; }
        const container = document.getElementById('classList');

        if (!batch || !anatomyBatch) {
            container.innerHTML = `<div class="empty-state">
                <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                <div class="empty-state-text">Enter your roll number to see your schedule</div>
            </div>`;
            return;
        }

        if (selectedDay === 'Friday') {
            container.innerHTML = `<div class="empty-state">
                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                <div class="empty-state-text">Friday is off — No classes today!</div>
            </div>`;
            return;
        }

        const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const todayName = DAYS[new Date().getDay()];
        const isToday = selectedDay === todayName;
        const now = nowMinutes();

        // Determine next upcoming class time
        let nextClassTime = null;
        if (isToday) {
            const fut = getMyClasses(selectedDay).find(c => timeToMinutes(c.time) > now);
            if (fut) nextClassTime = fut.time;
        }

        const daySchedule = schedule[selectedDay] || [];
        let html = '';
        const rendered = new Set();

        daySchedule.forEach(slot => {
            slot.classes.forEach(cls => {
                if (rendered.has(slot.time)) return;
                if (!(cls.batch === 'ALL' || cls.batch === batch || cls.anatomyBatch === anatomyBatch)) return;

                rendered.add(slot.time);

                const startMin = timeToMinutes(slot.time);
                const endMin   = startMin + slot.duration;
                const isOngoing = isToday && now >= startMin && now < endMin;
                const isNext    = isToday && !isOngoing && slot.time === nextClassTime;

                const itemCls  = isOngoing ? 'class-item ongoing' : isNext ? 'class-item next-up' : 'class-item';
                const timeCls  = isOngoing ? 'class-time ongoing-time' : isNext ? 'class-time nextup-time' : 'class-time';
                const chip     = isOngoing
                    ? '<span class="status-chip status-ongoing">Ongoing</span>'
                    : isNext
                        ? '<span class="status-chip status-next">Up Next</span>'
                        : '';

                html += `
                    <div class="${itemCls}">
                        <div class="class-header">
                            <span class="${timeCls}">
                                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                ${formatTime(slot.time)}${chip}
                            </span>
                            <span class="type-badge type-${cls.type.toLowerCase()}">${cls.type}</span>
                        </div>
                        <div class="class-subject">${cls.subject}</div>
                        <div class="class-details">
                            <span class="class-detail-item">
                                <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                ${cls.venue}
                            </span>
                            <span class="class-detail-item">
                                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                ${slot.duration} min
                            </span>
                        </div>
                    </div>`;
            });
        });

        container.innerHTML = html || `<div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
            <div class="empty-state-text">No classes scheduled for ${selectedDay}</div>
        </div>`;

        // Auto-refresh highlights every minute when viewing today
        if (isToday) scheduleRefreshTimer = setTimeout(updateSchedule, 60000);
    }

    // ── DAY SELECTOR ───────────────────────────────────────
    function createDaySelector() {
        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        document.getElementById('daySelector').innerHTML = days.map(day => {
            const isOff = day === 'Friday';
            const active = day === selectedDay ? 'active' : '';
            const off = isOff ? 'off' : '';
            return `<button class="day-btn ${active} ${off}" onclick="selectDay('${day}')">${day.slice(0,3)}</button>`;
        }).join('');
    }

    function selectDay(day) {
        selectedDay = day;
        createDaySelector();
        updateSchedule();
        updateCountdown();
    }

    // ── ROLL INPUT ─────────────────────────────────────────
    document.getElementById('rollInput').addEventListener('input', e => handleRollChange(e.target.value));

    function handleRollChange(value) {
        const rollNum = parseInt(value);
        if (isNaN(rollNum) || rollNum < 1 || rollNum > 229) {
            document.getElementById('infoBox').style.display = 'none';
            batch = ''; anatomyBatch = '';
            updateSchedule(); updateCountdown();
            return;
        }
        for (const [l, r] of Object.entries(batchRanges)) {
            if (rollNum >= r.start && rollNum <= r.end) { batch = l; break; }
        }
        for (const [l, r] of Object.entries(anatomyBatchRanges)) {
            if (rollNum >= r.start && rollNum <= r.end) { anatomyBatch = l; break; }
        }
        if (batch && anatomyBatch) {
            document.getElementById('batchBadge').textContent = batch;
            document.getElementById('anatomyBadge').textContent = anatomyBatch;
            document.getElementById('infoBox').style.display = 'block';
            localStorage.setItem('rollNumber', value);
            updateSchedule();
            updateCountdown();
        }
    }

    // ── INIT ───────────────────────────────────────────────
    function init() {
        // PWA — register service worker via blob (no separate sw.js needed)
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE='somc64-v1';
                self.addEventListener('install',e=>self.skipWaiting());
                self.addEventListener('activate',e=>e.waitUntil(clients.claim()));
                self.addEventListener('fetch',e=>{
                    if(e.request.method!=='GET')return;
                    e.respondWith(
                        caches.open(CACHE).then(cache=>
                            cache.match(e.request).then(cached=>
                                cached||fetch(e.request).then(resp=>{
                                    cache.put(e.request,resp.clone());
                                    return resp;
                                }).catch(()=>cached)
                            )
                        )
                    );
                });`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
        }

        // Restore saved roll number
        const saved = localStorage.getItem('rollNumber');
        if (saved) {
            document.getElementById('rollInput').value = saved;
            handleRollChange(saved);
        }

        // Set today
        const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        selectedDay = DAYS[new Date().getDay()];

        createDaySelector();
        updateSchedule();
        loadAnnouncements();

        // Live countdown every second
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(updateCountdown, 1000);
        updateCountdown();
    }

    init();
</script>
